version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 181684851025.dkr.ecr.eu-north-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t devops-app .
      - docker tag devops-app:latest 181684851025.dkr.ecr.eu-north-1.amazonaws.com/devops-app:latest

  post_build:
    commands:
      - echo Pushing image
      - docker push 181684851025.dkr.ecr.eu-north-1.amazonaws.com/devops-app:latest
      - echo Creating imagedefinitions.json
      - printf '[{"name":"app-container","imageUri":"181684851025.dkr.ecr.eu-north-1.amazonaws.com/devops-app:latest"}]' > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
